<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Profile - DSA Quest')}"></head>
<body>
    <div th:replace="~{layout :: sidebar}"></div>
    
    <main class="main-content">
        <div class="row g-5">
            <div class="col-md-4">
                <div class="glass-card text-center py-5">
                    <img th:src="'https://ui-avatars.com/api/?name=' + ${user.username} + '&background=58a6ff&color=fff&size=128'" class="rounded-circle mb-4 border border-secondary border-4" alt="Avatar">
                    <h2 class="fw-bold mb-1" th:text="${user.username}">Username</h2>
                    <p class="text-secondary mb-4" th:text="${user.email}">email@example.com</p>
                    
                    <div class="d-flex justify-content-around mt-4 pt-3 border-top border-secondary">
                        <div>
                            <div class="fw-bold text-primary fs-4" th:text="${user.totalXp}">0</div>
                            <div class="small text-secondary fw-bold">TOTAL XP</div>
                        </div>
                        <div>
                            <div class="fw-bold text-primary fs-4" th:text="${user.currentLevel}">1</div>
                            <div class="small text-secondary fw-bold">LEVEL</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="glass-card h-100">
                    <h4 class="fw-bold mb-4 d-flex align-items-center">
                        <i class="bi bi-patch-check-fill text-primary me-2"></i>
                        Achievements
                    </h4>
                    
                    <div class="row g-3">
                        <div th:each="ua : ${user.userAchievements}" class="col-lg-6">
                            <div class="p-4 rounded-3 border border-secondary d-flex align-items-center bg-dark" style="transition: transform 0.2s;">
                                <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-4 fs-2 text-primary">
                                    <i class="bi bi-award"></i>
                                </div>
                                <div>
                                    <h6 class="fw-bold mb-1" th:text="${ua.achievement.name}">Achievement</h6>
                                    <p class="text-secondary small mb-0" th:text="${ua.achievement.description}">Description</p>
                                    <small class="text-primary fw-bold" th:text="${#temporals.format(ua.earnedDate, 'MMM dd, yyyy')}"></small>
                                </div>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(user.userAchievements)}" class="col-12 py-5 text-center">
                            <div class="text-secondary mb-3 fs-1 opacity-25">🏆</div>
                            <p class="text-secondary">Keep solving problems to unlock legendary achievements.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
