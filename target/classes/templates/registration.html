<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Register - DSA Quest')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <div th:replace="~{layout :: sidebar}"></div>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow border-0">
                    <h2 class="text-center mb-4">Join the Quest</h2>
                    <form th:action="@{/register}" th:object="${user}" method="post">
                        <div class="mb-3"><label class="form-label">Username</label><input type="text" th:field="*{username}" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Email</label><input type="email" th:field="*{email}" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Password</label><input type="password" th:field="*{password}" class="form-control" required></div>
                        <button type="submit" class="btn btn-primary w-100">Create Account</button>
                    </form>
                    <p class="text-center mt-3 text-muted small">Already have an account? <a href="/login">Login here</a></p>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="~{layout :: footer}"></div>
</body>
</html>
