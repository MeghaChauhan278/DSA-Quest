<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">DSA Quest</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:fragment="sidebar" class="sidebar">

    <a href="/" class="sidebar-brand">
        <i class="bi bi-fire me-2"></i>
        <span>DSA Quest</span>
    </a>

    <ul class="nav-menu">
        <li class="nav-item">
            <a href="/dashboard" class="nav-link">
                <i class="bi bi-grid-1x2-fill me-3"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <li class="nav-item">
            <a href="/problems" class="nav-link">
                <i class="bi bi-journal-check me-3"></i>
                <span>Solved Problems</span>
            </a>
        </li>

        <li class="nav-item">
            <a href="/leaderboard" class="nav-link">
                <i class="bi bi-trophy-fill me-3"></i>
                <span>Leaderboard</span>
            </a>
        </li>

        <li class="nav-item">
            <a href="/profile" class="nav-link">
                <i class="bi bi-person-badge-fill me-3"></i>
                <span>Profile</span>
            </a>
        </li>
    </ul>

    <div style="position:absolute; bottom:2rem; width:calc(100% - 3rem);">

        <div th:if="${session.user != null}"
             class="d-flex align-items-center mb-3">

            <img th:src="'https://ui-avatars.com/api/?name=' + ${session.user.username} + '&background=58a6ff&color=fff&size=32'"
                 class="rounded-circle me-2">

            <span class="small fw-bold overflow-hidden text-nowrap"
                  th:text="${session.user.username}">
                Username
            </span>
        </div>

        <a th:if="${session.user != null}"
           href="/logout"
           class="nav-link text-danger p-0">
            <i class="bi bi-box-arrow-right me-3"></i>
            <span>Logout</span>
        </a>

        <a th:if="${session.user == null}"
           href="/login"
           class="btn btn-primary w-100">
            Login
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
